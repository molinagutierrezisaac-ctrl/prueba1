<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Invitación Isaac y Sofía</title>

<style>
  body {
    margin: 0;
    font-family: 'Georgia', serif;
  }

  /* Fondo fijo */
  .fondo {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background-image: url("invitacion.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    z-index: -1;
  }

  /* Contenedor */
  .container {
    position: relative;
    width: 100%;
    height: 100vh;
  }

  /* Contador */
  #countdown {
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translateX(-50%);
    color: #a67c52;
    font-size: 2.5vw;
    letter-spacing: 0.1em;
    text-align: center;
  }

  /* Botones invisibles */
  .btn-invisible {
    position: absolute;
    cursor: pointer;
  }

  /* Botón música */
  .btn-musica {
    top: 23%;
    left: 50%;
    width: 7%;
    height: 3%;
    transform: translateX(-50%);
  }

  /* Botón ubicación */
  .btn-ubicacion {
    top: 80%;
    left: 58%;
    width: 12%;
    height: 2.5%;
    transform: translateX(-50%);
  }

  /* Responsive */
  @media (max-width: 600px) {
    #countdown {
      font-size: 5vw;
    }

    .btn-musica {
      width: 10%;
      height: 4%;
      top: 25%;
    }

    .btn-ubicacion {
      width: 15%;
      height: 3.5%;
      top: 82%;
    }
  }

</style>
</head>
<body>

<!-- Fondo -->
<div class="fondo"></div>

<div class="container">

  <!-- Contador -->
  <div id="countdown"></div>

  <!-- Botón música -->
  <div class="btn-invisible btn-musica" onclick="toggleAudio()"></div>

  <!-- Botón ubicación -->
  <a href="https://maps.app.goo.gl/FT7mFgKbXzcSF8Wh7" target="_blank" class="btn-invisible btn-ubicacion"></a>

</div>

<!-- Audio -->
<audio id="audio">
  <source src="cancion.mp3" type="audio/mpeg">
</audio>

<!-- Script audio -->
<script>
function toggleAudio() {
    var audio = document.getElementById('audio');

    if (audio.paused) {
        audio.play().catch(function(e){
            console.log("Error al reproducir:", e);
        });
    } else {
        audio.pause();
    }
}
</script>

<!-- Script contador -->
<script>
var countDownDate = new Date("Jul 25, 2026 18:30:00").getTime();

var x = setInterval(function() {
  var now = new Date().getTime();
  var distance = countDownDate - now;

  var days = Math.floor(distance / (1000 * 60 * 60 * 24));
  var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

  document.getElementById("countdown").innerHTML =
    days + " DÍAS " + hours + " HRS " + minutes + " MIN";

  if (distance < 0) {
    clearInterval(x);
    document.getElementById("countdown").innerHTML = "¡ES HOY!";
  }
}, 1000);
</script>

</body>
</html>
